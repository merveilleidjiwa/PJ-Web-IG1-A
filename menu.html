<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

        body { 
            background: linear-gradient(180deg, #121b2b 0%, #080c14 100%);
            color: white; 
            font-family: 'Poppins', sans-serif; 
            padding: 20px 10px;
            margin: 0;
            overflow-x: hidden;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            height: 100vh;
        }
        h2 { 
            color: #d4af37; 
            font-weight: 600; 
            letter-spacing: 3px; 
            font-size: 1.2rem;
            margin-bottom: 30px;
            text-align: center;
            text-transform: uppercase;
        }
        ul { padding: 0; list-style: none; }
        hr { display: none; }
        
        .nav-link {
            color: #a0b0c0; 
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 10px; 
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 400;
            font-size: 0.95rem;
            text-decoration: none;
            white-space: nowrap;
            border: 1px solid rgba(212, 175, 55, 0.2); 
            border-left: 3px solid transparent; 
            background: rgba(255, 255, 255, 0.02); 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .nav-link i { font-size: 1.1rem; width: 25px; text-align: center; color: #5a6a7a; transition: 0.3s; }
        .nav-link:hover { background-color: rgba(212, 175, 55, 0.05); color: white; border-left: 3px solid #d4af37; transform: translateX(5px); }
        .nav-link:hover i { color: #d4af37; }
        .nav-link.active { background-color: rgba(212, 175, 55, 0.1); color: #d4af37; border-left: 3px solid #d4af37; font-weight: 600; }
        .nav-link.active i { color: #d4af37; }

        /* =========================================
           LE CODE MAGIQUE POUR MOBILE (MENU)
           ========================================= */
        @media (max-width: 768px) {
            body { padding: 10px 5px; }
            h2 { font-size: 0.8rem; margin-bottom: 15px; letter-spacing: 1px; }
            .nav-link { 
                flex-direction: column; /* Superpose l'icône et le texte */
                gap: 5px; 
                padding: 10px 2px; 
                font-size: 0.65rem; 
                text-align: center; 
                white-space: normal; /* Autorise le texte à passer à la ligne */
            }
            .nav-link i { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <h2>MENU</h2>
    <ul>
        <li><a href="page2.html" target="BODY" class="nav-link"><i class="fas fa-home"></i> PAGE 1</a></li>
        <li><a href="TP1.html" target="BODY" class="nav-link"><i class="fas fa-laptop-code"></i> TP 1</a></li>
        <li><a href="Page3.html" target="BODY" class="nav-link"><i class="fas fa-file-code"></i> TP 2</a></li>
        <li><a href="list.html" target="BODY" class="nav-link"><i class="fas fa-list-ul"></i> LISTE</a></li>
        <li><a href="tableau.html" target="BODY" class="nav-link"><i class="fas fa-table"></i> TABLEAU</a></li>
        <li><a href="Exo_tableau.html" target="BODY" class="nav-link"><i class="fas fa-border-all"></i> TP TAB</a></li>
        <li><a href="formulaire.html" target="BODY" class="nav-link"><i class="fas fa-wpforms"></i> FORM</a></li>
        <li><a href="CV.html" target="BODY" class="nav-link"><i class="fas fa-user-tie"></i> CV</a></li>
    </ul>
    <script>
        const links = document.querySelectorAll('.nav-link');
        links.forEach(link => {
            link.addEventListener('click', function() {
                links.forEach(l => l.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
