<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e18;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            width: 100%;
            /* Le même dégradé que le Header pour l'harmonie ! */
            background: linear-gradient(90deg, #0a0e18 0%, #162235 50%, #0a0e18 100%);
            height: 100%;
            border-top: 2px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 -5px 15px rgba(0,0,0,0.4); /* Ombre vers le haut */
            font-family: 'Segoe UI', sans-serif;
        }
        .copyright {
            color: #8fa3b8; /* Gris-bleu très chic */
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .copyright span {
            color: #d4af37; /* Ton nom en doré */
            font-weight: 800;
        }
        .btn-footer {
            color: #d4af37;
            text-decoration: none;
            margin-left: 12px;
            padding: 8px 16px;
            border-radius: 25px;
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-footer i { font-size: 16px; }
        
        .btn-footer:hover {
            background: #d4af37;
            color: #080c14;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
        }
    </style>
</head>
<body>
    <div class="footer">
        <div class="copyright">© 2026 <span>KALI MERVEILLE</span> (IG1-A)</div>
        <div>
            <a class="btn-footer" href="tel:+2290167424373">
                <i class="fas fa-phone-alt"></i> Appel
            </a>
            <a class="btn-footer" href="mailto:merveilleidjiwa5@gmail.com">
                <i class="fas fa-envelope"></i> Mail
            </a>
            <a class="btn-footer" href="https://wa.me/2290167424373" target="_blank">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>
        </div>
    </div>
</body>
</html>
